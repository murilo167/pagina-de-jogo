<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JokenPô Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="background"></div>

  <main class="game-container">
    <h1>🎮 Pedra, Papel e Tesoura</h1>
    <p class="subtitulo">Modo Multiplayer Local</p>

    <div class="scoreboard">
      <div class="score-card jogador1">
        <h2>Jogador 1</h2>
        <span id="score1">0</span>
      </div>

      <div class="vs">VS</div>

      <div class="score-card jogador2">
        <h2>Jogador 2</h2>
        <span id="score2">0</span>
      </div>
    </div>

    <div class="round-box">
      <h2 id="turno">Vez do Jogador 1</h2>
      <p id="mensagem">Escolha sua jogada</p>
    </div>

    <div class="choices">
      <button class="choice" data-choice="pedra">🪨<span>Pedra</span></button>
      <button class="choice" data-choice="papel">📄<span>Papel</span></button>
      <button class="choice" data-choice="tesoura">✂️<span>Tesoura</span></button>
    </div>

    <div class="result-box">
      <h2 id="resultado">Aguardando jogadas...</h2>
    </div>

    <div class="buttons">
      <button id="reset">🔄 Reiniciar</button>
    </div>
</html>
